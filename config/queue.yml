default: &default
  dispatchers:
    - polling_interval: 1
      batch_size: 500
  workers:
    - queues: "*"
      threads: 3
      processes: 0
      polling_interval: 0.1
  # scheduler:
  #   dynamic_tasks_enabled: true
  #   polling_interval: 5

development:
  <<: *default

test:
  <<: *default

production:
  <<: *default
