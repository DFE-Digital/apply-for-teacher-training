default: &default
  workers:
    - queues: [default, low_priority]
      threads: <%= ENV.fetch("DEFAULT_QUEUE_THREADS", 1) %>
      processes: <%= ENV.fetch("DEFAULT_QUEUE_PROCESSES", 1) %>
      polling_interval: 1

    - queues: [mailers]
      threads: <%= ENV.fetch("MAILER_QUEUE_THREADS", 1) %>
      processes: <%= ENV.fetch("MAILER_QUEUE_PROCESSES", 1) %>
      polling_interval: 1

    - queues: [big_query]
      threads: <%= ENV.fetch("BIG_QUERY_QUEUE_THREADS", 1) %>
      processes: <%= ENV.fetch("BIG_QUERY_QUEUE_PROCESSES", 1) %>
      polling_interval: 1

development:
  <<: *default

test:
  <<: *default

production:
  <<: *default
