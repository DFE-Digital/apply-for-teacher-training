default: &default
  workers:
    - queues: [default, low_priority]
      threads: <%= ENV.fetch("DEFAULT_QUEUE_THREADS", 1) %>
      processes: <%= ENV.fetch("DEFAULT_QUEUE_PROCESSES", 1) %>
      polling_interval: 1

    - queues: [mailers]
      threads: <%= ENV.fetch("MAILER_QUEUE_THREADS", 1) %>
      processes: <%= ENV.fetch("MAILER_QUEUE_PROCESSES", 1) %>
      polling_interval: 1

    - queues: [big_query_sq]
      threads: <%= ENV.fetch("BIG_QUERY_QUEUE_THREADS", 1) %>
      processes: <%= ENV.fetch("BIG_QUERY_QUEUE_PROCESSES", 1) %>
      polling_interval: 1

non_production: &non_production
  workers:
    - queues: [default, mailers, low_priority, big_query_sq]
      threads: 1
      processes: 1
      polling_interval: 3

qa:
  <<: *non_production

sandbox:
  <<: *non_production

development:
  <<: *non_production

test:
  <<: *non_production

production:
  <<: *default
