name: Build No Cache

on:
  workflow_dispatch:
  schedule:
    - cron: "30 12 * * 0"
    # Will run once a week on Sunday afternoon
  # push:
  #   branches:
  #     - add_build_image_gh_wrkflws

permissions:
  packages: write
  contents: write
  id-token: write
  pull-requests: write

jobs:
  build-no-cache:
    outputs:
      docker-image-tag: ${{ steps.build-image.outputs.tag }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # - name: Set Environment variable
      #   run: |
      #     GIT_REF=${{ github.ref }}
      #     echo "GIT_BRANCH=${GIT_REF##*/}" >> $GITHUB_ENV # GIT_BRANCH will be main for refs/heads/main
      #     echo "IMAGE_TAG=${{ github.sha }}" >> $GITHUB_ENV

      - name: Build without cache and push docker image
        id: build-image-gem-node-module
        uses: DFE-Digital/github-actions/build-docker-image@master
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          context: ""
          reuse-cache: false
          max-cache: false
          target: gems-node-modules
          docker-repository: ghcr.io/dfe-digital/apply-teacher-training-gems-node-modules

      - name: Build Docker Image
        id: build-image
        uses: DFE-Digital/github-actions/build-docker-image@build-docker-image-optional-cache-target
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          context: ""
          reuse-cache: false
          snyk-token: ${{ secrets.SNYK_TOKEN }}
          max-cache: false
          docker-repository: ghcr.io/dfe-digital/apply-teacher-training
          no-cache-filters: gems-node-modules

      # - name: Notify slack on failure
      #   uses: rtCamp/action-slack-notify@master
      #   if: ${{ failure() }}
